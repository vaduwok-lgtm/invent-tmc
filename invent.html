<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Инвентаризация ТМЦ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-dark: #1d4ed8;
            --green: #16a34a;
            --green-light: #f0fdf4;
            --red: #dc2626;
            --red-light: #fef2f2;
            --orange: #ea580c;
            --orange-light: #fff7ed;
            --purple: #7c3aed;
            --purple-light: #f5f3ff;
            --purple-dark: #6d28d9;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --nav-h: 64px;
            --header-h: 56px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            display: flex; flex-direction: column;
        }

        /* ── HEADER ── */
        .app-header {
            height: var(--header-h); background: #fff;
            border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; padding: 0 16px; gap: 12px;
            z-index: 10; flex-shrink: 0;
        }
        .logo {
            width: 32px; height: 32px; background: var(--primary);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 16px; flex-shrink: 0;
        }
        .header-title { flex: 1; font-size: 17px; font-weight: 700; color: var(--gray-800); }
        .header-reset-btn {
            background: none; border: none; font-size: 22px; cursor: pointer;
            padding: 6px; border-radius: 8px; color: var(--gray-400); touch-action: manipulation;
        }
        .header-reset-btn:active { background: var(--red-light); color: var(--red); }

        /* ── BODY ── */
        .app-body {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            height: calc(var(--nav-h) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: #fff; border-top: 1px solid var(--gray-200);
            display: flex; align-items: stretch; flex-shrink: 0; z-index: 10;
        }
        .nav-btn {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 3px;
            background: none; border: none; cursor: pointer;
            touch-action: manipulation; color: var(--gray-400);
            font-size: 11px; font-weight: 600; padding: 8px 4px;
            transition: color 0.15s; position: relative;
        }
        .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn.active::after {
            content: ''; position: absolute; top: 0; left: 20%; right: 20%;
            height: 3px; background: var(--primary); border-radius: 0 0 4px 4px;
        }
        .nav-badge {
            position: absolute; top: 6px; right: calc(50% - 20px);
            background: var(--green); color: white; font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; padding: 0 4px;
        }

        /* ── TAB VIEWS ── */
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        /* ══════════════════════════════════
           INVENTORY TAB
        ══════════════════════════════════ */
        .loc-strip-wrap {
            background: #fff; border-bottom: 1px solid var(--gray-200);
            padding: 10px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch;
            display: flex; gap: 8px; scrollbar-width: none;
        }
        .loc-strip-wrap::-webkit-scrollbar { display: none; }
        .loc-chip {
            flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 600; border: 1.5px solid var(--gray-200);
            background: #fff; color: var(--gray-500); cursor: pointer;
            touch-action: manipulation; transition: all 0.15s;
            white-space: nowrap; display: flex; align-items: center; gap: 6px;
        }
        .loc-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
        .loc-chip .loc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: none; }
        .loc-chip.has-data .loc-dot { display: block; }
        .loc-chip.active .loc-dot { background: rgba(255,255,255,0.7); }

        .stats-row { display: flex; gap: 10px; padding: 12px 12px 0; }
        .stat-pill {
            flex: 1; background: #fff; border: 1px solid var(--gray-200);
            border-radius: 12px; padding: 10px 8px; text-align: center;
        }
        .stat-pill .sp-val { font-size: 20px; font-weight: 700; color: var(--gray-800); line-height: 1; }
        .stat-pill .sp-val.green { color: var(--green); }
        .stat-pill .sp-val.blue { color: var(--primary); }
        .stat-pill .sp-lbl { font-size: 10px; color: var(--gray-400); margin-top: 3px; font-weight: 500; }

        .products-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

        .product-card {
            background: #fff; border: 1px solid var(--gray-200);
            border-radius: 16px; overflow: hidden;
        }
        .product-card.has-data { border-color: #bfdbfe; }
        .product-card.custom-product { border-color: #fed7aa; }
        .product-card.custom-product.has-data { border-color: #fb923c; }

        .product-header {
            display: flex; align-items: center; padding: 14px 14px 14px 16px;
            gap: 10px; cursor: pointer; touch-action: manipulation; user-select: none;
        }
        .product-indicator {
            width: 4px; align-self: stretch; border-radius: 4px;
            background: var(--gray-200); flex-shrink: 0; margin-left: -4px;
        }
        .product-card.has-data .product-indicator { background: var(--primary); }
        .product-card.custom-product .product-indicator { background: #fed7aa; }
        .product-card.custom-product.has-data .product-indicator { background: var(--orange); }

        .product-name { flex: 1; font-size: 15px; font-weight: 700; color: var(--gray-800); line-height: 1.3; }
        .product-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
        .product-total { font-size: 16px; font-weight: 700; color: var(--primary); }
        .product-total.zero { color: var(--gray-300); }
        .product-unit-tag {
            font-size: 11px; color: var(--gray-400); background: var(--gray-100);
            padding: 2px 8px; border-radius: 20px; font-weight: 600;
        }
        .custom-tag {
            font-size: 10px; color: var(--orange); background: var(--orange-light);
            padding: 2px 8px; border-radius: 20px; font-weight: 700;
        }
        .product-chevron { font-size: 18px; color: var(--gray-300); transition: transform 0.2s; flex-shrink: 0; }
        .product-card.open .product-chevron { transform: rotate(180deg); }

        .product-body {
            display: none; border-top: 1px solid var(--gray-100);
            padding: 12px; background: var(--gray-50);
        }
        .product-card.open .product-body { display: block; }

        .unit-block {
            margin-bottom: 10px; background: #fff;
            border: 1px solid var(--gray-200); border-radius: 12px; overflow: hidden;
        }
        .unit-block:last-of-type { margin-bottom: 0; }
        .unit-block-header {
            padding: 8px 12px; background: var(--gray-50);
            border-bottom: 1px solid var(--gray-100);
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .unit-name { font-size: 12px; font-weight: 700; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.04em; }
        .unit-subtotal { font-size: 12px; font-weight: 600; color: var(--primary); }
        .unit-rows { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

        .row-item { display: flex; align-items: center; gap: 6px; }
        .row-num { width: 20px; text-align: center; font-size: 11px; color: var(--gray-400); font-weight: 600; flex-shrink: 0; }

        .vc {
            flex: 1; display: flex; align-items: center; background: var(--gray-100);
            border-radius: 10px; overflow: hidden; border: 1px solid var(--gray-200); height: 48px;
        }
        .vc-btn {
            width: 48px; height: 48px; flex-shrink: 0; background: transparent; border: none;
            font-size: 26px; font-weight: 300; color: var(--gray-600); cursor: pointer;
            touch-action: manipulation; display: flex; align-items: center; justify-content: center;
            transition: background 0.1s;
        }
        .vc-btn:active { background: var(--primary); color: white; }
        .vc-input {
            flex: 1; text-align: center; font-size: 18px; font-weight: 700;
            background: #fff; border: none; color: var(--gray-800);
            padding: 0 4px; height: 100%; min-width: 0;
        }
        .vc-input:focus { outline: none; }
        .vc-input::placeholder { color: var(--gray-300); font-weight: 400; }

        .row-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .row-action-btn {
            width: 40px; height: 48px; border-radius: 10px; border: 1px solid var(--gray-200);
            background: #fff; font-size: 18px; font-weight: bold; cursor: pointer;
            touch-action: manipulation; display: flex; align-items: center; justify-content: center;
            color: var(--gray-500); transition: all 0.1s;
        }
        .row-action-btn:active { background: var(--gray-200); }
        .row-action-btn.del { background: var(--red-light); color: var(--red); border-color: #fecaca; }
        .row-action-btn.del:active { background: #fecaca; }

        .product-footer { padding: 10px 12px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .add-custom-btn, .clear-product-btn, .delete-product-btn {
            flex: 1; padding: 10px 12px; border-radius: 10px; font-size: 13px; font-weight: 600;
            border: 1.5px dashed var(--gray-300); background: transparent; color: var(--gray-500);
            cursor: pointer; touch-action: manipulation; text-align: center;
        }
        .add-custom-btn:active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); border-style: solid; }
        .clear-product-btn { border-color: #fecaca; color: var(--red); }
        .clear-product-btn:active { background: var(--red-light); }
        .delete-product-btn { border-color: #fed7aa; color: var(--orange); border-style: solid; background: var(--orange-light); }
        .delete-product-btn:active { background: #fed7aa; }

        .custom-form {
            margin: 0 12px 12px; background: var(--primary-light);
            border: 1px solid #bfdbfe; border-radius: 12px;
            padding: 12px; display: flex; flex-direction: column; gap: 8px;
        }
        .custom-form-title { font-size: 13px; font-weight: 700; color: var(--primary); }
        .custom-form input {
            background: #fff; border: 1px solid #bfdbfe; padding: 10px 12px;
            border-radius: 10px; color: var(--gray-800); font-size: 14px; width: 100%;
        }
        .custom-form input:focus { outline: 2px solid var(--primary); }
        .custom-form-btns { display: flex; gap: 8px; }
        .custom-form-btns button {
            flex: 1; padding: 10px; border-radius: 10px; font-size: 14px;
            font-weight: 700; border: none; cursor: pointer; touch-action: manipulation;
        }
        .cf-save { background: var(--primary); color: white; }
        .cf-cancel { background: var(--gray-100); color: var(--gray-600); }

        .add-product-form {
            margin: 0 12px 12px; background: var(--orange-light);
            border: 1px solid #fed7aa; border-radius: 16px;
            padding: 14px; display: flex; flex-direction: column; gap: 10px;
        }
        .add-product-form-title { font-size: 14px; font-weight: 700; color: var(--orange); }
        .add-product-form input, .add-product-form select {
            background: #fff; border: 1px solid #fed7aa; padding: 12px;
            border-radius: 10px; color: var(--gray-800); font-size: 15px; width: 100%;
        }
        .add-product-form input:focus, .add-product-form select:focus { outline: 2px solid var(--orange); }
        .add-product-form-btns { display: flex; gap: 8px; }
        .add-product-form-btns button {
            flex: 1; padding: 12px; border-radius: 10px; font-size: 14px;
            font-weight: 700; border: none; cursor: pointer; touch-action: manipulation;
        }
        .apf-save { background: var(--orange); color: white; }
        .apf-cancel { background: var(--gray-100); color: var(--gray-600); }

        .add-product-btn {
            margin: 0 12px 4px; padding: 14px; border-radius: 14px;
            font-size: 14px; font-weight: 700; border: 2px dashed #fed7aa;
            background: var(--orange-light); color: var(--orange); cursor: pointer;
            touch-action: manipulation; text-align: center; width: calc(100% - 24px);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .add-product-btn:active { background: #fed7aa; }

        .clear-loc-btn {
            margin: 8px 12px 12px; width: calc(100% - 24px); padding: 14px;
            background: var(--red-light); border: 1.5px solid #fecaca;
            border-radius: 12px; font-size: 14px; font-weight: 700; color: var(--red);
            cursor: pointer; touch-action: manipulation; text-align: center;
        }
        .clear-loc-btn:active { background: #fecaca; }

        .empty-state { text-align: center; padding: 48px 24px; color: var(--gray-400); }
        .empty-state .ei { font-size: 52px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        /* ══════════════════════════════════
           SUMMARY TAB
        ══════════════════════════════════ */
        .summary-header { padding: 16px 16px 12px; }
        .summary-header h2 { font-size: 18px; font-weight: 700; }
        .summary-header p { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
        .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 16px; }
        .ss-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 14px; padding: 14px; }
        .ss-card .ss-val { font-size: 26px; font-weight: 700; color: var(--gray-800); line-height: 1; }
        .ss-card .ss-val.green { color: var(--green); }
        .ss-card .ss-val.blue { color: var(--primary); }
        .ss-card .ss-lbl { font-size: 12px; color: var(--gray-400); margin-top: 4px; font-weight: 500; }
        .search-wrap { padding: 0 16px 12px; position: relative; }
        .search-wrap input {
            width: 100%; background: #fff; border: 1.5px solid var(--gray-200);
            border-radius: 12px; padding: 12px 16px 12px 40px; font-size: 15px; color: var(--gray-800);
        }
        .search-wrap input:focus { outline: none; border-color: var(--primary); }
        .search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--gray-400); pointer-events: none; }
        .filter-row { padding: 0 16px 12px; display: flex; gap: 8px; }
        .filter-chip {
            padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
            border: 1.5px solid var(--gray-200); background: #fff; color: var(--gray-500);
            cursor: pointer; touch-action: manipulation; transition: all 0.15s;
        }
        .filter-chip.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .summary-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
        .sum-item {
            background: #fff; border: 1px solid var(--gray-200); border-radius: 14px;
            padding: 14px; display: flex; align-items: flex-start; gap: 10px;
        }
        .sum-item.zero { opacity: 0.5; }
        .sum-item.custom { border-color: #fed7aa; }
        .sum-item-left { flex: 1; }
        .sum-item-name { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
        .sum-item-detail { font-size: 11px; color: var(--gray-400); line-height: 1.5; }
        .sum-item-right { text-align: right; flex-shrink: 0; }
        .sum-item-val { font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1; }
        .sum-item-val.zero { color: var(--gray-300); }
        .sum-item-unit { font-size: 11px; color: var(--gray-400); font-weight: 600; margin-top: 3px; }

        /* ══════════════════════════════════
           DS TAB
        ══════════════════════════════════ */
        .ds-content { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

        /* Секция */
        .ds-section {
            background: #fff; border: 1px solid var(--gray-200);
            border-radius: 16px; overflow: hidden;
        }
        .ds-section-header {
            padding: 14px 16px; background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; justify-content: space-between;
        }
        .ds-section-title {
            font-size: 15px; font-weight: 700; color: var(--gray-800);
            display: flex; align-items: center; gap: 8px;
        }
        .ds-section-total {
            font-size: 16px; font-weight: 700; color: var(--purple);
        }

        /* Номиналы сейфа */
        .safe-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
        .nominal-row {
            background: var(--gray-50); border: 1px solid var(--gray-200);
            border-radius: 12px; overflow: hidden;
        }
        .nominal-header {
            padding: 8px 12px; display: flex; align-items: center;
            justify-content: space-between; gap: 8px;
            cursor: pointer; touch-action: manipulation; user-select: none;
        }
        .nominal-label {
            font-size: 14px; font-weight: 700; color: var(--gray-700);
            display: flex; align-items: center; gap: 6px;
        }
        .nominal-badge {
            background: var(--purple-light); color: var(--purple);
            font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
        }
        .nominal-sum {
            font-size: 14px; font-weight: 700; color: var(--purple);
        }
        .nominal-sum.zero { color: var(--gray-300); }
        .nominal-chevron { font-size: 16px; color: var(--gray-300); transition: transform 0.2s; }
        .nominal-row.open .nominal-chevron { transform: rotate(180deg); }
        .nominal-rows-wrap {
            display: none; padding: 0 8px 8px;
        }
        .nominal-row.open .nominal-rows-wrap { display: block; }

        /* Строки номинала */
        .nominal-input-rows { display: flex; flex-direction: column; gap: 6px; }
        .nom-row-item { display: flex; align-items: center; gap: 6px; }
        .nom-row-num { width: 20px; text-align: center; font-size: 11px; color: var(--gray-400); font-weight: 600; flex-shrink: 0; }

        .nom-vc {
            flex: 1; display: flex; align-items: center; background: var(--gray-100);
            border-radius: 10px; overflow: hidden; border: 1px solid var(--gray-200); height: 48px;
        }
        .nom-vc-btn {
            width: 48px; height: 48px; flex-shrink: 0; background: transparent; border: none;
            font-size: 26px; font-weight: 300; color: var(--gray-600); cursor: pointer;
            touch-action: manipulation; display: flex; align-items: center; justify-content: center;
            transition: background 0.1s;
        }
        .nom-vc-btn:active { background: var(--purple); color: white; }
        .nom-vc-input {
            flex: 1; text-align: center; font-size: 18px; font-weight: 700;
            background: #fff; border: none; color: var(--gray-800);
            padding: 0 4px; height: 100%; min-width: 0;
        }
        .nom-vc-input:focus { outline: none; }
        .nom-vc-input::placeholder { color: var(--gray-300); font-weight: 400; }

        .nom-row-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .nom-row-btn {
            width: 40px; height: 48px; border-radius: 10px; border: 1px solid var(--gray-200);
            background: #fff; font-size: 18px; font-weight: bold; cursor: pointer;
            touch-action: manipulation; display: flex; align-items: center; justify-content: center;
            color: var(--gray-500);
        }
        .nom-row-btn:active { background: var(--gray-200); }
        .nom-row-btn.del { background: var(--red-light); color: var(--red); border-color: #fecaca; }
        .nom-row-btn.del:active { background: #fecaca; }

        /* Итого сейфа */
        .safe-total-row {
            margin: 4px 12px 12px; padding: 14px 16px;
            background: var(--purple-light); border: 1.5px solid #ddd6fe;
            border-radius: 12px; display: flex; align-items: center; justify-content: space-between;
        }
        .safe-total-label { font-size: 14px; font-weight: 700; color: var(--purple); }
        .safe-total-val { font-size: 22px; font-weight: 700; color: var(--purple); }

        /* Касса / Авто карточка */
        .cash-card {
            background: #fff; border: 1px solid var(--gray-200); border-radius: 16px; overflow: hidden;
        }
        .cash-card-header {
            padding: 12px 16px; background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .cash-card-title { font-size: 15px; font-weight: 700; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
        .cash-card-result {
            font-size: 15px; font-weight: 700;
        }
        .cash-card-result.positive { color: var(--green); }
        .cash-card-result.negative { color: var(--red); }
        .cash-card-result.zero { color: var(--gray-300); }

        .cash-card-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

        .cash-field {
            display: flex; align-items: center; gap: 10px;
            background: var(--gray-50); border: 1px solid var(--gray-200);
            border-radius: 12px; padding: 10px 14px;
        }
        .cash-field-label { font-size: 13px; font-weight: 600; color: var(--gray-500); flex: 1; }
        .cash-field-input {
            background: #fff; border: 1.5px solid var(--gray-200);
            border-radius: 10px; padding: 10px 14px; font-size: 17px; font-weight: 700;
            color: var(--gray-800); text-align: right; width: 160px;
        }
        .cash-field-input:focus { outline: none; border-color: var(--purple); }
        .cash-field-input::placeholder { color: var(--gray-300); font-weight: 400; }

        .cash-result-row {
            display: flex; align-items: center; gap: 10px;

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);

            opacity: 0; transition: all 0.3s; z-index: 1000;
            white-space: nowrap; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>

},

    function getRows(loc,pid,uIdx){const r=localStorage.getItem(`inv_${loc}_${pid}_${uIdx}`);return r?JSON.parse(r):[null];}

    ════════════════════════════════ */
    const NOMINALS = [5000,2000,1000,500,200,100,50,10,5,2,1];

        const r = localStorage.getItem('ds_data');
        if (r) return JSON.parse(r);
        return {
            safe: NOMINALS.reduce((acc,n)=>{ acc[n]=[null]; return acc; },{}),
            kassas: [

    /* ════════════════════════════════
       CALC — инвентаризация
    ════════════════════════════════ */
    function getLocTotal(loc,pid){
        const cps=getCustomProducts(loc);
        const cp=cps.find(p=>p.id===pid);
        if(cp){
            let t=0;
            (cp.rows||[null]).forEach(v=>{t+=v==null||v===''?0:parseFloat(v);});
            (cp.customUnits||[]).forEach(cu=>{(cu.rows||[null]).forEach(v=>{t+=(v==null||v===''?0:parseFloat(v))*cu.coefficient;});});
            return t;
        }
        let t=0;
        const rules=locationRules[loc]?.[pid];
        if(rules)rules.forEach((u,i)=>getRows(loc,pid,i).forEach(v=>{t+=u.toBase(v==null||v===''?0:parseFloat(v));}));
        getCU(loc,pid).forEach(cu=>cu.rows.forEach(v=>{t+=(v==null||v===''?0:parseFloat(v))*cu.coefficient;}));
        return t;
    }
    function getAllTotal(pid){return locations.reduce((s,loc)=>s+getLocTotal(loc,pid),0);}
    function fmt(baseUnit,val){return baseUnit==='шт'?Math.round(val):Math.round(val*1000)/1000;}
    function getStep(label){const l=label.toLowerCase();return l==='кг'||l==='л'?0.1:1;}
    function rnd(v,s){return s===0.1?Math.round(v*10)/10:Math.round(v);}

    /* ════════════════════════════════
       CALC — ДС
    ════════════════════════════════ */
    function fmtMoney(v){
        if(v===0||v==='')return '0 ₽';
        return v.toLocaleString('ru-RU')+ ' ₽';
    }
    function parseMoney(v){
        if(v===''||v===null||v===undefined)return 0;
        return parseFloat(String(v).replace(/\s/g,'').replace(',','.'))||0;
    }

    function calcSafeTotal(){
    return NOMINALS.reduce((s,n)=>s+calcNominalTotal(n),0);
}
    function calcCashItem(item){
        const vsego=parseMoney(item.vsego);
        const vyruchka=parseMoney(item.vyruchka);
        return vsego - vyruchka;
    }
    function calcKassasTotal(){
        const ds=getDsData();
        return ds.kassas.reduce((s,k)=>s+calcCashItem(k),0);
    }
    function calcAvtosTotal(){
        const ds=getDsData();
        return ds.avtos.reduce((s,a)=>s+calcCashItem(a),0);
    }
    function calcGrandTotal(){
        return calcSafeTotal()+calcKassasTotal()+calcAvtosTotal();
    }

    /* ════════════════════════════════
       TOAST
    ════════════════════════════════ */
    function toast(msg){
        const t=document.getElementById('toast');
        t.textContent=msg; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),2200);
    }

    /* ════════════════════════════════
       NAV BADGE
    ════════════════════════════════ */
    function updateNavBadge(){
        const stdF=stdProducts.filter(p=>locations.some(loc=>getLocTotal(loc,p.id)>0)).length;
        const cpF=locations.reduce((s,loc)=>s+getCustomProducts(loc).filter(cp=>getLocTotal(loc,cp.id)>0).length,0);
        const total=stdF+cpF;
        const badge=document.getElementById('navBadge');
        badge.style.display=total>0?'flex':'none';
        badge.textContent=total;
    }

    /* ════════════════════════════════
       LOCATION STRIP
    ════════════════════════════════ */
    function renderLocStrip(){
        const c=document.getElementById('locStrip');
        c.innerHTML='';
        locations.forEach((loc,i)=>{
            const chip=document.createElement('div');
            chip.className='loc-chip'+(i===currentLocIdx?' active':'');
            chip.id=`locchip_${i}`;
            const sH=Object.keys(locationRules[loc]||{}).some(pid=>getLocTotal(loc,pid)>0);
            const cH=getCustomProducts(loc).some(cp=>getLocTotal(loc,cp.id)>0);
            if(sH||cH)chip.classList.add('has-data');
            chip.innerHTML=`<span class="loc-dot"></span>${loc}`;
            chip.onclick=()=>switchLocation(i);
            c.appendChild(chip);
        });
    }
    function updateLocChipData(locIdx){
        const chip=document.getElementById(`locchip_${locIdx}`);
        if(!chip)return;
        const loc=locations[locIdx];
        const sH=Object.keys(locationRules[loc]||{}).some(pid=>getLocTotal(loc,pid)>0);
        const cH=getCustomProducts(loc).some(cp=>getLocTotal(loc,cp.id)>0);
        chip.classList.toggle('has-data',sH||cH);
    }

    /* ════════════════════════════════
       STATS
    ════════════════════════════════ */
    function renderStats(){
        const stdPids=Object.keys(locationRules[currentLoc]||{});
        const cpList=getCustomProducts(currentLoc);
        const total=stdPids.length+cpList.length;
        const filled=stdPids.filter(pid=>getLocTotal(currentLoc,pid)>0).length
                    +cpList.filter(cp=>getLocTotal(currentLoc,cp.id)>0).length;
        const pct=total>0?Math.round(filled/total*100):0;
        document.getElementById('stTotal').textContent=total;
        document.getElementById('stFilled').textContent=filled;
        document.getElementById('stPct').textContent=pct+'%';
    }

    /* ════════════════════════════════
       SWITCH LOCATION
    ════════════════════════════════ */
    function switchLocation(idx){
        currentLocIdx=idx; currentLoc=locations[idx];
        renderLocStrip();
        const active=document.getElementById(`locchip_${idx}`);
        if(active)active.scrollIntoView({block:'nearest',inline:'center'});
        renderStats(); renderProducts();
        document.getElementById('addProductFormWrap').innerHTML='';
    }

    /* ════════════════════════════════
       RENDER PRODUCTS
    ════════════════════════════════ */
    function renderProducts(){
        const container=document.getElementById('productsList');
        container.innerHTML='';
        const rules=locationRules[currentLoc]||{};
        const stdPids=new Set(Object.keys(rules));
        stdProducts.forEach(p=>{if(getCU(currentLoc,p.id).length>0)stdPids.add(p.id);});
        stdPids.forEach(pid=>{
            const product=stdProducts.find(p=>p.id===pid);
            if(!product)return;
            container.appendChild(buildStdProductCard(product,rules[pid]||[]));
        });
        getCustomProducts(currentLoc).forEach(cp=>{container.appendChild(buildCustomProductCard(cp));});
    }

    /* ════════════════════════════════
       СТАНДАРТНАЯ КАРТОЧКА
    ════════════════════════════════ */
    function buildStdProductCard(product,unitRules){
        const pid=product.id;
        const totalVal=fmt(product.baseUnit,getLocTotal(currentLoc,pid));
        const hasData=totalVal>0;
        const card=document.createElement('div');
        card.className='product-card'+(hasData?' has-data':'');
        card.id=`pcard_${pid}`;
        const header=document.createElement('div');
        header.className='product-header';
        header.innerHTML=`
            <div class="product-indicator"></div>
            <div class="product-name">${product.name}</div>
            <div class="product-meta">
                <div class="product-total ${hasData?'':'zero'}" id="ptotal_${pid}">${totalVal}</div>
                <div class="product-unit-tag">${product.baseUnit}</div>
            </div>
            <div class="product-chevron">⌄</div>`;
        header.onclick=()=>card.classList.toggle('open');
        card.appendChild(header);
        const body=document.createElement('div');
        body.className='product-body';
        unitRules.forEach((unit,uIdx)=>{body.appendChild(buildUnitBlock(currentLoc,pid,uIdx,unit.label,false,null,product.baseUnit));});
        getCU(currentLoc,pid).forEach((cu,cuIdx)=>{body.appendChild(buildUnitBlock(currentLoc,pid,cuIdx,cu.label,true,cu.coefficient,product.baseUnit));});
        const footer=document.createElement('div');
        footer.className='product-footer';
        const addBtn=document.createElement('button');
        addBtn.className='add-custom-btn';
        addBtn.textContent='➕ Своя единица';
        addBtn.onclick=()=>toggleCustomUnitForm(body,currentLoc,pid,false);
        const clrBtn=document.createElement('button');
        clrBtn.className='clear-product-btn';
        clrBtn.textContent='🗑 Очистить';
        clrBtn.onclick=()=>{
            if(!confirm(`Очистить "${product.name}"?`))return;
            unitRules.forEach((_,uIdx)=>setRows(currentLoc,pid,uIdx,[null]));
            setCU(currentLoc,pid,[]);
            refreshStdCard(pid,product,unitRules);
        };
        footer.appendChild(addBtn); footer.appendChild(clrBtn);
        body.appendChild(footer); card.appendChild(body);
        return card;
    }

    /* ════════════════════════════════
       КАСТОМНАЯ КАРТОЧКА ПРОДУКТА
    ════════════════════════════════ */
    function buildCustomProductCard(cp){
        const pid=cp.id;
        const totalVal=fmt(cp.baseUnit,getLocTotal(currentLoc,pid));
        const hasData=totalVal>0;
        const card=document.createElement('div');
        card.className='product-card custom-product'+(hasData?' has-data':'');
        card.id=`pcard_${pid}`;
        const header=document.createElement('div');
        header.className='product-header';
        header.innerHTML=`
            <div class="product-indicator"></div>
            <div class="product-name">${cp.name}</div>
            <div class="product-meta">
                <div class="product-total ${hasData?'':'zero'}" id="ptotal_${pid}">${totalVal}</div>
                <div class="product-unit-tag">${cp.baseUnit}</div>
                <div class="custom-tag">свой</div>
            </div>
            <div class="product-chevron">⌄</div>`;
        header.onclick=()=>card.classList.toggle('open');
        card.appendChild(header);
        const body=document.createElement('div');
        body.className='product-body';
        body.appendChild(buildCustomProductUnitBlock(cp));
        (cp.customUnits||[]).forEach((_,cuIdx)=>{body.appendChild(buildCPCustomUnitBlock(cp,cuIdx));});
        const footer=document.createElement('div');
        footer.className='product-footer';
        const addUnitBtn=document.createElement('button');
        addUnitBtn.className='add-custom-btn';
        addUnitBtn.textContent='➕ Своя единица';
        addUnitBtn.onclick=()=>toggleCustomUnitForm(body,currentLoc,pid,true);
        const clrBtn=document.createElement('button');
        clrBtn.className='clear-product-btn';
        clrBtn.textContent='🗑 Очистить';
        clrBtn.onclick=()=>{
            if(!confirm(`Очистить "${cp.name}"?`))return;
            let cps=getCustomProducts(currentLoc);
            const idx=cps.findIndex(p=>p.id===pid);
            if(idx!==-1){cps[idx].rows=[null];cps[idx].customUnits=[];setCustomProducts(currentLoc,cps);}
            refreshCustomCard(pid);
        };
        const delBtn=document.createElement('button');
        delBtn.className='delete-product-btn';
        delBtn.textContent='✖ Удалить продукт';
        delBtn.onclick=()=>{
            if(!confirm(`Удалить продукт "${cp.name}"?`))return;
            let cps=getCustomProducts(currentLoc);
            setCustomProducts(currentLoc,cps.filter(p=>p.id!==pid));
            renderProducts(); renderStats(); updateLocChipData(currentLocIdx); updateNavBadge();
            toast(`🗑 "${cp.name}" удалён`);
        };
        footer.appendChild(addUnitBtn); footer.appendChild(clrBtn); footer.appendChild(delBtn);
        body.appendChild(footer); card.appendChild(body);
        return card;
    }

    function buildCustomProductUnitBlock(cp){
        const pid=cp.id; const s=getStep(cp.baseUnit);
        const block=document.createElement('div');
        block.className='unit-block';
        const bHeader=document.createElement('div');
        bHeader.className='unit-block-header';
        bHeader.innerHTML=`<div class="unit-name">${cp.baseUnit}</div><div class="unit-subtotal" id="cpust_${pid}_base"></div>`;
        block.appendChild(bHeader);
        const rowsWrap=document.createElement('div');
        rowsWrap.className='unit-rows';
        block.appendChild(rowsWrap);
        function refreshRows(){
            const cps=getCustomProducts(currentLoc);
            const cur=cps.find(p=>p.id===pid);
            if(!cur)return;
            const data=cur.rows||[null];
            rowsWrap.innerHTML='';
            let sub=0;
            data.forEach((val,i)=>{
                const v=val==null||val===''?0:parseFloat(val); sub+=v;
                const row=makeRowDOM(val,s,(nv)=>{
                    let c=getCustomProducts(currentLoc);
                    const ci=c.findIndex(p=>p.id===pid);
                    if(ci!==-1){c[ci].rows[i]=nv;setCustomProducts(currentLoc,c);}
                    updateCPSubtotal(pid,'base',cp.baseUnit); updateCPCardTotal(pid,cp.baseUnit); updateNavBadge();
                    if(document.getElementById('tabSummary').classList.contains('active'))renderSummary();
                },()=>{
                    let c=getCustomProducts(currentLoc);
                    const ci=c.findIndex(p=>p.id===pid);
                    if(ci!==-1){c[ci].rows.push(null);setCustomProducts(currentLoc,c);}
                    refreshRows();
                },()=>{
                    let c=getCustomProducts(currentLoc);
                    const ci=c.findIndex(p=>p.id===pid);
                    if(ci!==-1){if(c[ci].rows.length===1)c[ci].rows=[null];else c[ci].rows.splice(i,1);setCustomProducts(currentLoc,c);}
                    refreshRows(); updateCPSubtotal(pid,'base',cp.baseUnit); updateCPCardTotal(pid,cp.baseUnit); updateNavBadge();
                },i);
                rowsWrap.appendChild(row);
            });
            const el=document.getElementById(`cpust_${pid}_base`);
            if(el)el.textContent=sub>0?`= ${rnd(sub,s)}`:'';
        }
        refreshRows();
        return block;
    }

    function buildCPCustomUnitBlock(cp,cuIdx){
        const pid=cp.id;
        const block=document.createElement('div');
        block.className='unit-block';
        const bHeader=document.createElement('div');
        bHeader.className='unit-block-header';
        const nameEl=document.createElement('div');
        nameEl.className='unit-name';
        nameEl.textContent=`${cp.customUnits[cuIdx].label} ×${cp.customUnits[cuIdx].coefficient}`;
        const delBtn=document.createElement('button');
        delBtn.style.cssText='background:var(--red-light);border:none;color:var(--red);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;';
        delBtn.textContent='✖';
        delBtn.onclick=()=>{
            let cps=getCustomProducts(currentLoc);
            const ci=cps.findIndex(p=>p.id===pid);
            if(ci!==-1){cps[ci].customUnits.splice(cuIdx,1);setCustomProducts(currentLoc,cps);}
            refreshCustomCard(pid);
        };
        bHeader.appendChild(nameEl); bHeader.appendChild(delBtn); block.appendChild(bHeader);
        const rowsWrap=document.createElement('div');
        rowsWrap.className='unit-rows';
        block.appendChild(rowsWrap);
        function refreshRows(){
            const cps=getCustomProducts(currentLoc);
            const cur=cps.find(p=>p.id===pid);
            if(!cur||!cur.customUnits[cuIdx])return;
            const coef=cur.customUnits[cuIdx].coefficient;
            const data=cur.customUnits[cuIdx].rows||[null];
            rowsWrap.innerHTML='';
            data.forEach((val,i)=>{
                const row=makeRowDOM(val,1,(nv)=>{
                    let c=getCustomProducts(currentLoc);
                    const ci=c.findIndex(p=>p.id===pid);
                    if(ci!==-1){c[ci].customUnits[cuIdx].rows[i]=nv;setCustomProducts(currentLoc,c);}
                    updateCPCardTotal(pid,cur.baseUnit); updateNavBadge();
                    if(document.getElementById('tabSummary').classList.contains('active'))renderSummary();
                },()=>{
                    let c=getCustomProducts(currentLoc);
                    const ci=c.findIndex(p=>p.id===pid);
                    if(ci!==-1){c[ci].customUnits[cuIdx].rows.push(null);setCustomProducts(currentLoc,c);}
                    refreshRows();
                },()=>{
                    let c=getCustomProducts(currentLoc);
                    const ci=c.findIndex(p=>p.id===pid);
                    if(ci!==-1){
                        if(c[ci].customUnits[cuIdx].rows.length===1)c[ci].customUnits[cuIdx].rows=[null];
                        else c[ci].customUnits[cuIdx].rows.splice(i,1);
                        setCustomProducts(currentLoc,c);
                    }
                    refreshRows(); updateCPCardTotal(pid,cur.baseUnit); updateNavBadge();
                },i);
                rowsWrap.appendChild(row);
            });
        }
        refreshRows();
        return block;
    }

    /* ════════════════════════════════
       СТАНДАРТНЫЙ UNIT BLOCK
    ════════════════════════════════ */
    function buildUnitBlock(loc,pid,idx,label,isCustom,coef,baseUnit){
        const s=getStep(label);
        const block=document.createElement('div');
        block.className='unit-block';
        const bHeader=document.createElement('div');
        bHeader.className='unit-block-header';
        const nameEl=document.createElement('div');
        nameEl.className='unit-name';
        nameEl.textContent=isCustom?`${label} ×${coef}`:label;
        const subEl=document.createElement('div');
        subEl.className='unit-subtotal';
        subEl.id=`ust_${loc}_${pid}_${idx}_${isCustom?'c':'s'}`;
        if(isCustom){
            const delBtn=document.createElement('button');
            delBtn.style.cssText='background:var(--red-light);border:none;color:var(--red);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;';
            delBtn.textContent='✖';
            delBtn.onclick=()=>{
                let cu=getCU(loc,pid);cu.splice(idx,1);setCU(loc,pid,cu);
                refreshStdCard(pid,stdProducts.find(p=>p.id===pid),locationRules[loc]?.[pid]||[]);
            };
            bHeader.appendChild(nameEl); bHeader.appendChild(delBtn);
        } else { bHeader.appendChild(nameEl); bHeader.appendChild(subEl); }
        block.appendChild(bHeader);
        const rowsWrap=document.createElement('div');
        rowsWrap.className='unit-rows';
        block.appendChild(rowsWrap);
        function refreshRows(){
            const data=isCustom?(getCU(loc,pid)[idx]?.rows||[null]):getRows(loc,pid,idx);
            rowsWrap.innerHTML='';
            let sub=0;
            data.forEach((val,i)=>{
                const v=val==null||val===''?0:parseFloat(val);
                sub+=isCustom?v*coef:(locationRules[loc]?.[pid]?.[idx]?.toBase(v)||0);
                const row=makeRowDOM(val,s,(nv)=>{
                    if(isCustom){let cu=getCU(loc,pid);if(cu[idx]){cu[idx].rows[i]=nv;setCU(loc,pid,cu);}}
                    else{let r=getRows(loc,pid,idx);r[i]=nv;setRows(loc,pid,idx,r);}
                    updateSubtotal(loc,pid,idx,isCustom,coef);
                    updateCardTotal(pid,baseUnit); updateNavBadge();
                    if(document.getElementById('tabSummary').classList.contains('active'))renderSummary();
                },()=>{
                    if(isCustom){let cu=getCU(loc,pid);if(cu[idx]){cu[idx].rows.push(null);setCU(loc,pid,cu);}}
                    else{let r=getRows(loc,pid,idx);r.push(null);setRows(loc,pid,idx,r);}
                    refreshRows();
                },()=>{
                    if(isCustom){let cu=getCU(loc,pid);if(cu[idx]){if(cu[idx].rows.length===1)cu[idx].rows=[null];else cu[idx].rows.splice(i,1);setCU(loc,pid,cu);}}
                    else{let r=getRows(loc,pid,idx);if(r.length===1)r=[null];else r.splice(i,1);setRows(loc,pid,idx,r);}
                    refreshRows(); updateSubtotal(loc,pid,idx,isCustom,coef);
                    updateCardTotal(pid,baseUnit); updateNavBadge();
                },i);
                rowsWrap.appendChild(row);
            });
            const stEl=document.getElementById(`ust_${loc}_${pid}_${idx}_${isCustom?'c':'s'}`);
            if(stEl)stEl.textContent=sub>0?`= ${rnd(sub,0.1)}`:'';
        }
        refreshRows();
        return block;
    }

    /* ════════════════════════════════
       ФАБРИКА СТРОКИ ВВОДА
    ════════════════════════════════ */
    function makeRowDOM(val,s,onSave,onAdd,onRemove,rowIdx){
        const row=document.createElement('div');
        row.className='row-item';
        const num=document.createElement('span');
        num.className='row-num';
        num.textContent=rowIdx+1;
        const vc=document.createElement('div');
        vc.className='vc';
        const dec=document.createElement('button');
        dec.className='vc-btn'; dec.textContent='−';
        const inp=document.createElement('input');
        inp.className='vc-input'; inp.type='number'; inp.inputMode='decimal';
        inp.step=s; inp.placeholder='0';
        inp.value=val==null||val===''?'':val;
        const inc=document.createElement('button');
        inc.className='vc-btn'; inc.textContent='+';
        vc.appendChild(dec); vc.appendChild(inp); vc.appendChild(inc);
        const acts=document.createElement('div');
        acts.className='row-actions';
        const addRow=document.createElement('button');
        addRow.className='row-action-btn'; addRow.textContent='+';
        const delRow=document.createElement('button');
        delRow.className='row-action-btn del'; delRow.textContent='−';
        acts.appendChild(addRow); acts.appendChild(delRow);
        row.appendChild(num); row.appendChild(vc); row.appendChild(acts);
        const save=()=>{
            let nv=inp.value===''?null:rnd(parseFloat(inp.value)||0,s);
            if(nv!==null)inp.value=nv;
            onSave(nv);
        };
        inp.addEventListener('change',save);
        inp.addEventListener('blur',save);
        dec.addEventListener('click',()=>{let v=inp.value===''?0:parseFloat(inp.value)||0;inp.value=rnd(Math.max(0,v-s),s);save();});
        inc.addEventListener('click',()=>{let v=inp.value===''?0:parseFloat(inp.value)||0;inp.value=rnd(v+s,s);save();});
        addRow.addEventListener('click',onAdd);
        delRow.addEventListener('click',onRemove);
        return row;
    }

    /* ════════════════════════════════
       ОБНОВЛЕНИЕ БЕЗ ПЕРЕРИСОВКИ
    ════════════════════════════════ */
    function updateSubtotal(loc,pid,idx,isCustom,coef){
        const data=isCustom?(getCU(loc,pid)[idx]?.rows||[null]):getRows(loc,pid,idx);
        let t=0;
        data.forEach(v=>{const n=v==null||v===''?0:parseFloat(v);t+=isCustom?n*coef:(locationRules[loc]?.[pid]?.[idx]?.toBase(n)||0);});
        const el=document.getElementById(`ust_${loc}_${pid}_${idx}_${isCustom?'c':'s'}`);
        if(el)el.textContent=t>0?`= ${rnd(t,0.1)}`:'';
    }
    function updateCardTotal(pid,baseUnit){
        const el=document.getElementById(`ptotal_${pid}`);
        const card=document.getElementById(`pcard_${pid}`);
        if(!el||!card)return;
        const val=fmt(baseUnit,getLocTotal(currentLoc,pid));
        el.textContent=val;
        el.className='product-total'+(val>0?'':' zero');
        card.classList.toggle('has-data',val>0);
        updateLocChipData(currentLocIdx); renderStats();
    }
    function updateCPSubtotal(pid,key,baseUnit){
        const cps=getCustomProducts(currentLoc);
        const cp=cps.find(p=>p.id===pid);
        if(!cp)return;
        const data=cp.rows||[null];
        const s=getStep(baseUnit);
        let t=0;
        data.forEach(v=>{t+=v==null||v===''?0:parseFloat(v);});
        const el=document.getElementById(`cpust_${pid}_${key}`);
        if(el)el.textContent=t>0?`= ${rnd(t,s)}`:'';
    }
    function updateCPCardTotal(pid,baseUnit){
        const el=document.getElementById(`ptotal_${pid}`);
        const card=document.getElementById(`pcard_${pid}`);
        if(!el||!card)return;
        const val=fmt(baseUnit,getLocTotal(currentLoc,pid));
        el.textContent=val;
        el.className='product-total'+(val>0?'':' zero');
        card.classList.toggle('has-data',val>0);
        updateLocChipData(currentLocIdx); renderStats();
    }
    function refreshStdCard(pid,product,unitRules){
        const card=document.getElementById(`pcard_${pid}`);
        if(!card)return;
        const wasOpen=card.classList.contains('open');
        const newCard=buildStdProductCard(product,unitRules);
        if(wasOpen)newCard.classList.add('open');
        card.replaceWith(newCard);
        updateLocChipData(currentLocIdx); renderStats(); updateNavBadge();
        if(document.getElementById('tabSummary').classList.contains('active'))renderSummary();
    }
    function refreshCustomCard(pid){
        const card=document.getElementById(`pcard_${pid}`);
        if(!card)return;
        const cps=getCustomProducts(currentLoc);
        const cp=cps.find(p=>p.id===pid);
        if(!cp)return;
        const wasOpen=card.classList.contains('open');
        const newCard=buildCustomProductCard(cp);
        if(wasOpen)newCard.classList.add('open');
        card.replaceWith(newCard);
        updateLocChipData(currentLocIdx); renderStats(); updateNavBadge();
        if(document.getElementById('tabSummary').classList.contains('active'))renderSummary();
    }

    /* ════════════════════════════════
       CUSTOM UNIT FORM
    ════════════════════════════════ */
    function toggleCustomUnitForm(body,loc,pid,isForCustomProduct){
        const existing=body.querySelector('.custom-form');
        if(existing){existing.remove();return;}
        const form=document.createElement('div');
        form.className='custom-form';
        form.innerHTML=`
            <div class="custom-form-title">➕ Новая единица</div>
            <input type="text" placeholder="Название (напр. коробка 10 кг)" id="cfLabel">

    function renderSummary(){
        const allRows=[];
        stdProducts.forEach(p=>{
            const total=locations.reduce((s,loc)=>s+getLocTotal(loc,p.id),0);
            const display=fmt(p.baseUnit,total);
            const detail=locations.filter(loc=>locationRules[loc]?.[p.id])
                .map(loc=>{const v=fmt(p.baseUnit,getLocTotal(loc,p.id));return v>0?`${loc}: ${v}`:null;})
                .filter(Boolean).join('\n');
            allRows.push({pid:p.id,name:p.name,unit:p.baseUnit,total:display,detail,isCustom:false});
        });
        const seenCp=new Set();
        locations.forEach(loc=>{
            getCustomProducts(loc).forEach(cp=>{
                if(seenCp.has(cp.id))return;
                seenCp.add(cp.id);
                const total=getLocTotal(loc,cp.id);
                const display=fmt(cp.baseUnit,total);
                allRows.push({pid:cp.id,name:cp.name,unit:cp.baseUnit,total:display,detail:loc,isCustom:true});
            });
        });
        const filled=allRows.filter(r=>r.total>0).length;
        document.getElementById('summaryStats').innerHTML=`
            <div class="ss-card"><div class="ss-val">${allRows.length}</div><div class="ss-lbl">Всего позиций</div></div>
            <div class="ss-card"><div class="ss-val green">${filled}</div><div class="ss-lbl">Заполнено</div></div>
            <div class="ss-card"><div class="ss-val blue">${Math.round(filled/allRows.length*100)}%</div><div class="ss-lbl">Готовность</div></div>
            <div class="ss-card"><div class="ss-val">${allRows.length-filled}</div><div class="ss-lbl">Пустых</div></div>`;
        let rows=allRows;
        if(searchQ)rows=rows.filter(r=>r.name.toLowerCase().includes(searchQ.toLowerCase()));
        if(filterOnlyFilled)rows=rows.filter(r=>r.total>0);
        const list=document.getElementById('summaryList');
        list.innerHTML='';
        if(rows.length===0){list.innerHTML=`<div class="empty-state"><div class="ei">🔍</div><p>Ничего не найдено</p></div>`;return;}
        rows.forEach(r=>{
            const item=document.createElement('div');
            item.className='sum-item'+(r.total===0?' zero':'')+(r.isCustom?' custom':'');
            item.innerHTML=`
                <div class="sum-item-left">
                    <div class="sum-item-name">${r.name}${r.isCustom?' <span style="font-size:10px;color:var(--orange);background:var(--orange-light);padding:1px 6px;border-radius:10px;font-weight:700;">свой</span>':''}</div>
                    ${r.detail?`<div class="sum-item-detail">${r.detail.replace(/\n/g,'<br>')}</div>`:''}
                </div>
                <div class="sum-item-right">
                    <div class="sum-item-val ${r.total===0?'zero':''}">${r.total}</div>
                    <div class="sum-item-unit">${r.unit}</div>
                </div>`;
            list.appendChild(item);
        });
    }

                            type="number" inputmode="numeric" min="0" placeholder="0"
                            id="cup_count_${n}"
                            style="width:100%;background:#fff;border:1.5px solid #ddd6fe;
                                   border-radius:10px;padding:10px 12px;font-size:17px;
                                   font-weight:700;color:var(--gray-800);text-align:center;"
                        >
                    </div>
                    <div style="font-size:22px;color:var(--gray-400);padding-top:18px;">=</div>

                        <div style="font-size:11px;color:var(--gray-500);font-weight:600;margin-bottom:4px;">Итого</div>

            const ds2=getDsData();
            const cups=ds2.safe[`cups_${n}`]||{per:'',count:''};
            setTimeout(()=>{
                const perEl=document.getElementById(`cup_per_${n}`);
                const cntEl=document.getElementById(`cup_count_${n}`);

                if(cntEl)cntEl.value=cups.count||'';
                if(resEl){

                    resEl.textContent=fmtMoney(cupTotal);
                }
                const saveCup=()=>{
                    const per=parseInt(perEl.value)||0;
                    const cnt=parseInt(cntEl.value)||0;

                    let ds3=getDsData();

                    saveDsData(ds3);
                    updateNomTotal(n);
                    updateSafeTotal();
                    updateGrandTotal();
                };
                if(perEl)perEl.addEventListener('input',saveCup);
                if(cntEl)cntEl.addEventListener('input',saveCup);

        function refreshNomRows(){

            const data=dsNow.safe[n]||[null];

                const nomItem=document.createElement('div');

                numEl.className='nom-row-num';

                inc2.className='nom-vc-btn'; inc2.textContent='+';

                const acts=document.createElement('div');
                acts.className='nom-row-actions';
                const addBtn=document.createElement('button');
                addBtn.className='nom-row-btn'; addBtn.textContent='+';
                const delBtn=document.createElement('button');
                delBtn.className='nom-row-btn del'; delBtn.textContent='−';

                nomItem.appendChild(numEl); nomItem.appendChild(vc); nomItem.appendChild(acts);
                inputRows.appendChild(nomItem);

                const saveNom=()=>{
                    let nv=inp.value===''?null:Math.max(0,parseInt(inp.value)||0);
                    if(nv!==null)inp.value=nv;
                    let ds2=getDsData();
                    ds2.safe[n][i]=nv;
                    saveDsData(ds2);
                    updateNomTotal(n);
                    updateSafeTotal();
                    updateGrandTotal();
                };
                inp.addEventListener('change',saveNom);
                inp.addEventListener('blur',saveNom);
                dec.addEventListener('click',()=>{
                    let v=inp.value===''?0:parseInt(inp.value)||0;
                    inp.value=Math.max(0,v-1); saveNom();
                });
                inc2.addEventListener('click',()=>{
                    let v=inp.value===''?0:parseInt(inp.value)||0;
                    inp.value=v+1; saveNom();
                });
                addBtn.addEventListener('click',()=>{
                    let ds2=getDsData();
                    ds2.safe[n].push(null);
                    saveDsData(ds2);
                    refreshNomRows();
                });
                delBtn.addEventListener('click',()=>{
                    let ds2=getDsData();
                    if(ds2.safe[n].length===1)ds2.safe[n]=[null];
                    else ds2.safe[n].splice(i,1);
                    saveDsData(ds2);
                    refreshNomRows();
                    updateNomTotal(n);
                    updateSafeTotal();
                    updateGrandTotal();
                });
            });
        }
        refreshNomRows();
        body.appendChild(nomRow);
    });
    }

    function calcCupTotal(n){
    if(n!==10&&n!==1)return 0;
    const ds=getDsData();
    const cups=ds.safe[`cups_${n}`]||{per:'',count:''};
    const per=parseInt(cups.per)||0;
    const cnt=parseInt(cups.count)||0;
    return per*cnt*n;
}

function calcNominalTotal(n){
    const ds=getDsData();
    const rows=ds.safe[n]||[null];
    const rowsTotal=rows.reduce((s,v)=>s+n*(v==null||v===''?0:parseInt(v)||0),0);
    const cupTotal=calcCupTotal(n);
    return rowsTotal+cupTotal;
}

function updateNomTotal(n){
    const total=calcNominalTotal(n);
    const el=document.getElementById(`nomsum_${n}`);
    if(el){el.textContent=fmtMoney(total);el.className='nominal-sum'+(total===0?' zero':'');}
    // обновляем поле результата стакана
    if(n===10||n===1){
        const resEl=document.getElementById(`cup_result_${n}`);
        if(resEl)resEl.textContent=fmtMoney(calcCupTotal(n));
    }
}
    function updateSafeTotal(){
        const total=calcSafeTotal();
        const el=document.getElementById('safeTotal');
        const hel=document.getElementById('safeTotalHeader');
        if(el)el.textContent=fmtMoney(total);
        if(hel)hel.textContent=fmtMoney(total);
    }

    function renderCashList(type){
        const ds=getDsData();
        const items=type==='kassa'?ds.kassas:ds.avtos;
        const listId=type==='kassa'?'kassaList':'avtoList';
        const container=document.getElementById(listId);
        if(!container)return;
        container.innerHTML='';
        items.forEach((item,idx)=>{
            container.appendChild(buildCashCard(item,idx,type));
        });
        updateCashSectionTotal(type);
    }

    function buildCashCard(item,idx,type){
        const result=calcCashItem(item);
        const card=document.createElement('div');
        card.className='cash-card';
        card.id=`cashcard_${item.id}`;

        const header=document.createElement('div');
        header.className='cash-card-header';
        const resClass=result>0?'positive':result<0?'negative':'zero';
        header.innerHTML=`
            <div class="cash-card-title">
                ${type==='kassa'?'💵':'🚗'} ${item.name}
            </div>
            <div class="cash-card-result ${resClass}" id="cashresheader_${item.id}">${fmtMoney(result)}</div>`;
        card.appendChild(header);

        const body=document.createElement('div');
        body.className='cash-card-body';

        // Всего
        const vsField=document.createElement('div');
        vsField.className='cash-field';
        vsField.innerHTML=`<div class="cash-field-label">Всего</div>`;
        const vsInp=document.createElement('input');
        vsInp.className='cash-field-input';
        vsInp.type='number'; vsInp.inputMode='decimal';
        vsInp.placeholder='0'; vsInp.value=item.vsego||'';
        vsField.appendChild(vsInp);
        body.appendChild(vsField);

        // Выручка
        const vrField=document.createElement('div');
        vrField.className='cash-field';
        vrField.innerHTML=`<div class="cash-field-label">Выручка</div>`;
        const vrInp=document.createElement('input');
        vrInp.className='cash-field-input';
        vrInp.type='number'; vrInp.inputMode='decimal';
        vrInp.placeholder='0'; vrInp.value=item.vyruchka||'';
        vrField.appendChild(vrInp);
        body.appendChild(vrField);

        // Итог
        const resRow=document.createElement('div');
        resRow.className='cash-result-row';
        const resVal=result>0?'positive':result<0?'negative':'zero';
        resRow.innerHTML=`
            <div class="cash-result-label">Итог (Всего − Выручка)</div>
            <div class="cash-result-val ${resVal}" id="cashres_${item.id}">${fmtMoney(result)}</div>`;
        body.appendChild(resRow);
        card.appendChild(body);

        // Кнопка удалить (если больше одной)
        const ds=getDsData();
        const items=type==='kassa'?ds.kassas:ds.avtos;
        if(items.length>1){
            const footer=document.createElement('div');
            footer.className='cash-card-footer';
            const delBtn=document.createElement('button');
            delBtn.className='delete-cash-btn';
            delBtn.textContent=`✖ Удалить ${type==='kassa'?'кассу':'авто'}`;
            delBtn.onclick=()=>{
                if(!confirm(`Удалить "${item.name}"?`))return;
                let ds2=getDsData();
                if(type==='kassa')ds2.kassas.splice(idx,1);
                else ds2.avtos.splice(idx,1);
                saveDsData(ds2);
                renderCashList(type);
                updateGrandTotal();
            };
            footer.appendChild(delBtn);
            card.appendChild(footer);
        }

        // Events
        const saveField=()=>{
            let ds2=getDsData();
            const arr=type==='kassa'?ds2.kassas:ds2.avtos;
            const ci=arr.findIndex(x=>x.id===item.id);
            if(ci!==-1){
                arr[ci].vsego=vsInp.value;
                arr[ci].vyruchka=vrInp.value;
                saveDsData(ds2);
                const newRes=calcCashItem(arr[ci]);
                const rc=newRes>0?'positive':newRes<0?'negative':'zero';
                const el=document.getElementById(`cashres_${item.id}`);
                const hel=document.getElementById(`cashresheader_${item.id}`);
                if(el){el.textContent=fmtMoney(newRes);el.className=`cash-result-val ${rc}`;}
                if(hel){hel.textContent=fmtMoney(newRes);hel.className=`cash-card-result ${rc}`;}
                updateCashSectionTotal(type);
                updateGrandTotal();
            }
        };
        vsInp.addEventListener('change',saveField);
        vsInp.addEventListener('blur',saveField);
        vrInp.addEventListener('change',saveField);
        vrInp.addEventListener('blur',saveField);

        return card;
    }

    function updateCashSectionTotal(type){
        const ds=getDsData();
        const items=type==='kassa'?ds.kassas:ds.avtos;
        const total=items.reduce((s,it)=>s+calcCashItem(it),0);
        const hid=type==='kassa'?'kassaTotalHeader':'avtoTotalHeader';
        const el=document.getElementById(hid);
        if(el)el.textContent=fmtMoney(total);
    }

        const safeT=calcSafeTotal();
        const kassaT=calcKassasTotal();

        });
        breakdown.innerHTML=lines;
        const sumEl=document.getElementById('dsGrandSum');
        if(sumEl)sumEl.textContent=fmtMoney(grand);

    /* ════════════════════════════════
       CLEAR / RESET INVENTORY
    ════════════════════════════════ */
    function clearLocation(){
        if(!confirm(`Очистить все данные для "${currentLoc}"?`))return;
        const rules=locationRules[currentLoc]||{};
        Object.keys(rules).forEach(pid=>{
            rules[pid].forEach((_,uIdx)=>setRows(currentLoc,pid,uIdx,[null]));
            setCU(currentLoc,pid,[]);
        });
        let cps=getCustomProducts(currentLoc);
        cps.forEach(cp=>{cp.rows=[null];cp.customUnits=[];});
        setCustomProducts(currentLoc,cps);
        document.getElementById('addProductFormWrap').innerHTML='';
        renderLocStrip(); renderStats(); renderProducts(); updateNavBadge();
        toast('🧹 Помещение очищено');
    }
    function fullReset(){
        if(!confirm('⚠️ Удалить ВСЕ данные по всем помещениям?'))return;
        locations.forEach(loc=>{
            const rules=locationRules[loc]||{};
            Object.keys(rules).forEach(pid=>{
                rules[pid].forEach((_,uIdx)=>setRows(loc,pid,uIdx,[null]));
                setCU(loc,pid,[]);
            });
            stdProducts.forEach(p=>setCU(loc,p.id,[]));
            setCustomProducts(loc,[]);
        });
        document.getElementById('addProductFormWrap').innerHTML='';
        renderLocStrip(); renderStats(); renderProducts(); updateNavBadge();
        if(document.getElementById('tabSummary').classList.contains('active'))renderSummary();
        toast('🗑️ Все данные удалены');
    }

    /* ════════════════════════════════
       TAB SWITCH
    ════════════════════════════════ */
    function switchTab(tab){
        document.querySelectorAll('.tab-view').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('appBody').scrollTop=0;
        if(tab==='inventory'){
            document.getElementById('tabInventory').classList.add('active');
            document.getElementById('navInventory').classList.add('active');
        } else if(tab==='summary'){
            document.getElementById('tabSummary').classList.add('active');
            document.getElementById('navSummary').classList.add('active');
            renderSummary();
        } else if(tab==='ds'){
            document.getElementById('tabDs').classList.add('active');
            document.getElementById('navDs').classList.add('active');
            renderDs();
        }
    }

    /* ════════════════════════════════
       INIT
    ════════════════════════════════ */
    function init(){
        renderLocStrip(); renderStats(); renderProducts(); updateNavBadge();

        document.getElementById('clearLocBtn').onclick=clearLocation;
        document.getElementById('hardResetBtn').onclick=fullReset;
        document.getElementById('addProductBtn').onclick=showAddProductForm;
        document.getElementById('addKassaBtn').onclick=addKassa;
        document.getElementById('addAvtoBtn').onclick=addAvto;
        document.getElementById('dsClearBtn').onclick=clearDs;

        document.querySelectorAll('.nav-btn').forEach(btn=>{
            btn.onclick=()=>switchTab(btn.dataset.tab);
        });

        document.getElementById('searchInput').oninput=e=>{
            searchQ=e.target.value; renderSummary();
        };

        const btnAll=document.getElementById('filterAllBtn');
        const btnFilled=document.getElementById('filterFilledBtn');
        btnAll.onclick=()=>{filterOnlyFilled=false;btnAll.classList.add('active');btnFilled.classList.remove('active');renderSummary();};
        btnFilled.onclick=()=>{filterOnlyFilled=true;btnFilled.classList.add('active');btnAll.classList.remove('active');renderSummary();};
    }

    init();
})();
</script>
</body>

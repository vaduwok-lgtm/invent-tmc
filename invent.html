<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Инвентаризация ТМЦ</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-dark: #1d4ed8;
            --green: #16a34a;
            --green-light: #f0fdf4;
            --red: #dc2626;
            --red-light: #fef2f2;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --nav-h: 64px;
            --header-h: 56px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            display: flex;
            flex-direction: column;
        }

        .app-header {
            height: var(--header-h);
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }
        .app-header .logo {
            width: 32px; height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .app-header .header-title {
            flex: 1;
            font-size: 17px;
            font-weight: 700;
            color: var(--gray-800);
        }
        .header-reset-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            color: var(--gray-400);
            touch-action: manipulation;
        }
        .header-reset-btn:active { background: var(--red-light); color: var(--red); }

        .app-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
        }

        .bottom-nav {
            height: calc(var(--nav-h) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: #fff;
            border-top: 1px solid var(--gray-200);
            display: flex;
            align-items: stretch;
            flex-shrink: 0;
            z-index: 10;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: none;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
            color: var(--gray-400);
            font-size: 11px;
            font-weight: 600;
            padding: 8px 4px;
            transition: color 0.15s;
            position: relative;
        }
        .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 3px;
            background: var(--primary);
            border-radius: 0 0 4px 4px;
        }
        .nav-badge {
            position: absolute;
            top: 6px; right: calc(50% - 20px);
            background: var(--green);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px; height: 18px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 4px;
        }

        .tab-view { display: none; }
        .tab-view.active { display: block; }

        .loc-strip-wrap {
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            padding: 10px 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            gap: 8px;
            scrollbar-width: none;
        }
        .loc-strip-wrap::-webkit-scrollbar { display: none; }
        .loc-chip {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1.5px solid var(--gray-200);
            background: #fff;
            color: var(--gray-500);
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.15s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .loc-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .loc-chip .loc-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            display: none;
        }
        .loc-chip.has-data .loc-dot { display: block; }
        .loc-chip.active .loc-dot { background: rgba(255,255,255,0.7); }

        .stats-row {
            display: flex;
            gap: 10px;
            padding: 12px 12px 0;
        }
        .stat-pill {
            flex: 1;
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 10px 8px;
            text-align: center;
        }
        .stat-pill .sp-val {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-800);
            line-height: 1;
        }
        .stat-pill .sp-val.green { color: var(--green); }
        .stat-pill .sp-val.blue { color: var(--primary); }
        .stat-pill .sp-lbl {
            font-size: 10px;
            color: var(--gray-400);
            margin-top: 3px;
            font-weight: 500;
        }

        .products-list {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-card {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            overflow: hidden;
        }
        .product-card.has-data { border-color: #bfdbfe; }

        .product-header {
            display: flex;
            align-items: center;
            padding: 14px 14px 14px 16px;
            gap: 10px;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
        }
        .product-indicator {
            width: 4px;
            align-self: stretch;
            border-radius: 4px;
            background: var(--gray-200);
            flex-shrink: 0;
            margin-left: -4px;
        }
        .product-card.has-data .product-indicator { background: var(--primary); }

        .product-name {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-800);
            line-height: 1.3;
        }
        .product-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
        }
        .product-total { font-size: 16px; font-weight: 700; color: var(--primary); }
        .product-total.zero { color: var(--gray-300); }
        .product-unit-tag {
            font-size: 11px;
            color: var(--gray-400);
            background: var(--gray-100);
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .product-chevron {
            font-size: 18px;
            color: var(--gray-300);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .product-card.open .product-chevron { transform: rotate(180deg); }

        .product-body {
            display: none;
            border-top: 1px solid var(--gray-100);
            padding: 12px;
            background: var(--gray-50);
        }
        .product-card.open .product-body { display: block; }

        .unit-block {
            margin-bottom: 10px;
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            overflow: hidden;
        }
        .unit-block:last-of-type { margin-bottom: 0; }

        .unit-block-header {
            padding: 8px 12px;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .unit-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .unit-subtotal { font-size: 12px; font-weight: 600; color: var(--primary); }

        .unit-rows { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

        .row-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .row-num {
            width: 20px;
            text-align: center;
            font-size: 11px;
            color: var(--gray-400);
            font-weight: 600;
            flex-shrink: 0;
        }

        .vc {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--gray-100);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            height: 48px;
        }
        .vc-btn {
            width: 48px; height: 48px;
            flex-shrink: 0;
            background: transparent;
            border: none;
            font-size: 26px;
            font-weight: 300;
            color: var(--gray-600);
            cursor: pointer;
            touch-action: manipulation;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.1s;
        }
        .vc-btn:active { background: var(--primary); color: white; }
        .vc-input {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            background: #fff;
            border: none;
            color: var(--gray-800);
            padding: 0 4px;
            height: 100%;
            min-width: 0;
        }
        .vc-input:focus { outline: none; }
        .vc-input::placeholder { color: var(--gray-300); font-weight: 400; }

        .row-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .row-action-btn {
            width: 40px; height: 48px;
            border-radius: 10px;
            border: 1px solid var(--gray-200);
            background: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-500);
            transition: all 0.1s;
        }
        .row-action-btn:active { background: var(--gray-200); }
        .row-action-btn.del { background: var(--red-light); color: var(--red); border-color: #fecaca; }
        .row-action-btn.del:active { background: #fecaca; }

        .product-footer {
            padding: 10px 12px 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .add-custom-btn, .clear-product-btn {
            flex: 1;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: 1.5px dashed var(--gray-300);
            background: transparent;
            color: var(--gray-500);
            cursor: pointer;
            touch-action: manipulation;
            text-align: center;
        }
        .add-custom-btn:active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); border-style: solid; }
        .clear-product-btn { border-color: #fecaca; color: var(--red); }
        .clear-product-btn:active { background: var(--red-light); }

        .custom-form {
            margin: 0 12px 12px;
            background: var(--primary-light);
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .custom-form-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
        .custom-form input {
            background: #fff;
            border: 1px solid #bfdbfe;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--gray-800);
            font-size: 14px;
            width: 100%;
        }
        .custom-form input:focus { outline: 2px solid var(--primary); }
        .custom-form-btns { display: flex; gap: 8px; }
        .custom-form-btns button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
        }
        .cf-save { background: var(--primary); color: white; }
        .cf-cancel { background: var(--gray-100); color: var(--gray-600); }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--gray-400);
        }
        .empty-state .ei { font-size: 52px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        .clear-loc-btn {
            margin: 12px;
            width: calc(100% - 24px);
            padding: 14px;
            background: var(--red-light);
            border: 1.5px solid #fecaca;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            color: var(--red);
            cursor: pointer;
            touch-action: manipulation;
            text-align: center;
        }
        .clear-loc-btn:active { background: #fecaca; }

        .summary-header {
            padding: 16px 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .summary-header h2 { font-size: 18px; font-weight: 700; color: var(--gray-800); }
        .summary-header p { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 16px 16px;
        }
        .ss-card {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            padding: 14px;
        }
        .ss-card .ss-val { font-size: 26px; font-weight: 700; color: var(--gray-800); line-height: 1; }
        .ss-card .ss-val.green { color: var(--green); }
        .ss-card .ss-val.blue { color: var(--primary); }
        .ss-card .ss-lbl { font-size: 12px; color: var(--gray-400); margin-top: 4px; font-weight: 500; }

        .search-wrap { padding: 0 16px 12px; position: relative; }
        .search-wrap input {
            width: 100%;
            background: #fff;
            border: 1.5px solid var(--gray-200);
            border-radius: 12px;
            padding: 12px 16px 12px 40px;
            font-size: 15px;
            color: var(--gray-800);
        }
        .search-wrap input:focus { outline: none; border-color: var(--primary); }
        .search-icon {
            position: absolute;
            left: 28px; top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--gray-400);
            pointer-events: none;
        }

        .filter-row { padding: 0 16px 12px; display: flex; gap: 8px; }
        .filter-chip {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1.5px solid var(--gray-200);
            background: #fff;
            color: var(--gray-500);
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.15s;
        }
        .filter-chip.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

        .summary-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
        .sum-item {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .sum-item.zero { opacity: 0.5; }
        .sum-item-left { flex: 1; }
        .sum-item-name { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
        .sum-item-detail { font-size: 11px; color: var(--gray-400); line-height: 1.5; }
        .sum-item-right { text-align: right; flex-shrink: 0; }
        .sum-item-val { font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1; }
        .sum-item-val.zero { color: var(--gray-300); }
        .sum-item-unit { font-size: 11px; color: var(--gray-400); font-weight: 600; margin-top: 3px; }

        .copy-block { padding: 16px; }
        .copy-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .copy-btn:active { background: var(--primary-dark); }
        .copy-hint { text-align: center; font-size: 12px; color: var(--gray-400); margin-top: 8px; }

        .toast {
            position: fixed;
            bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--gray-800);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo">📦</div>
    <div style="flex:1;">
        <div class="header-title">Инвентаризация</div>
    </div>
    <button class="header-reset-btn" id="hardResetBtn">🗑️</button>
</header>

<div class="app-body" id="appBody">

    <div class="tab-view active" id="tabInventory">
        <div class="loc-strip-wrap" id="locStrip"></div>
        <div class="stats-row">
            <div class="stat-pill">
                <div class="sp-val" id="stTotal">—</div>
                <div class="sp-lbl">Позиций</div>
            </div>
            <div class="stat-pill">
                <div class="sp-val green" id="stFilled">—</div>
                <div class="sp-lbl">Заполнено</div>
            </div>
            <div class="stat-pill">
                <div class="sp-val blue" id="stPct">—</div>
                <div class="sp-lbl">Готовность</div>
            </div>
        </div>
        <div class="products-list" id="productsList"></div>
        <button class="clear-loc-btn" id="clearLocBtn">🧹 Очистить помещение</button>
    </div>

    <div class="tab-view" id="tabSummary">
        <div class="summary-header">
            <div>
                <h2>Итоги</h2>
                <p>По всем помещениям</p>
            </div>
        </div>
        <div class="summary-stats" id="summaryStats"></div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Поиск продукта...">
        </div>
        <div class="filter-row">
            <button class="filter-chip" id="filterAllBtn">Все</button>
            <button class="filter-chip active" id="filterFilledBtn">Только заполненные</button>
        </div>
        <div class="summary-list" id="summaryList"></div>
        <div class="copy-block">
            <button class="copy-btn" id="copyBtn">📋 Копировать в Excel</button>
            <div class="copy-hint">Вставьте скопированные данные в таблицу (Ctrl+V)</div>
        </div>
    </div>

</div>

<nav class="bottom-nav">
    <button class="nav-btn active" id="navInventory" data-tab="inventory">
        <span class="nav-icon">📝</span>
        Подсчёт
    </button>
    <button class="nav-btn" id="navSummary" data-tab="summary">
        <span class="nav-icon">📊</span>
        Итоги
        <span class="nav-badge" id="navBadge" style="display:none;"></span>
    </button>
</nav>

<div class="toast" id="toast"></div>

<script>
(function () {
    const products = [
        { id:"p1",  name:"Голень",                    baseUnit:"шт" },
        { id:"p2",  name:"Крылья",                    baseUnit:"шт" },
        { id:"p3",  name:"Байтсы",                    baseUnit:"кг" },
        { id:"p4",  name:"Филе Классик",              baseUnit:"шт" },
        { id:"p5",  name:"Филе Зингер",               baseUnit:"шт" },
        { id:"p6",  name:"Филе куриное малое",        baseUnit:"шт" },
        { id:"p7",  name:"Филе куриное малое острое", baseUnit:"шт" },
        { id:"p8",  name:"Наггетсы",                  baseUnit:"шт" },
        { id:"p9",  name:"Креветки",                  baseUnit:"кг" },
        { id:"p10", name:"Картофель фри",             baseUnit:"кг" },
        { id:"p11", name:"Картофельные дольки",       baseUnit:"кг" },
        { id:"p12", name:"Смесь для мороженого",      baseUnit:"кг" },
        { id:"p13", name:"Смесь для коктейля",        baseUnit:"кг" },
        { id:"p14", name:"Молоко",                    baseUnit:"л"  },
        { id:"p15", name:"Сыр Хохланд",               baseUnit:"шт" },
        { id:"p16", name:"Кофе",                      baseUnit:"кг" },
        { id:"p17", name:"Мука",                      baseUnit:"кг" },
        { id:"p18", name:"Пиво Бад бочковое",         baseUnit:"л"  },
        { id:"p19", name:"Пиво RED FINCH В КЕГЕ",     baseUnit:"л"  },
        { id:"p20", name:"Баллон СО₂ Пепси 20 мл",   baseUnit:"шт" },
        { id:"p21", name:"Баллон газовый СО₂ ПИВО",  baseUnit:"шт" },
        { id:"p22", name:"Кега мал пиво 20 л",        baseUnit:"шт" },
        { id:"p23", name:"Кега бол пиво 30 л",        baseUnit:"шт" },
        { id:"p24", name:"Котлета куриная",            baseUnit:"кг" },
        { id:"p25", name:"Котлета сырная",             baseUnit:"кг" },
        { id:"p26", name:"Бекон нарезанный",           baseUnit:"кг" },
        { id:"p27", name:"Масло фритюрное",            baseUnit:"кг" }
    ];

    function mu(label, fn) { return { label, toBase: fn }; }

    const RM = {1:22.31,2:20.09,3:17.87,4:15.65,5:13.43,6:11.21,7:8.99,8:6.77};
    const RC = {1:25.38,2:23.22,3:21.06,4:18.9,5:16.74,6:14.58,7:12.42,8:10.26};

    const locationRules = {
        "На станции": {
            p1:  [mu("шт",q=>q), mu("пакет (18 шт)",q=>q*18)],

            p7:  [mu("шт",q=>q), mu("пакет (36 шт)",q=>q*36), mu("коробка (8 пак.)",q=>q*288), mu("коробка (10 пак.)",q=>q*360)],
            p8:  [mu("шт",q=>q), mu("пакет (100 шт)",q=>q*100), mu("коробка (7 пак.)",q=>q*700)],

            p10: [mu("кг",q=>q), mu("пакет (2,5 кг)",q=>q*2.5), mu("коробка (5 пак.)",q=>q*12.5)],
            p11: [mu("кг",q=>q), mu("пакет (2,5 кг)",q=>q*2.5), mu("коробка (5 пак.)",q=>q*12.5)],
            p24: [mu("кг",q=>q), mu("упаковка (2 кг)",q=>q*2), mu("коробка (12 кг)",q=>q*12)],
            p25: [mu("кг",q=>q), mu("упаковка (1 кг)",q=>q), mu("коробка (10 кг)",q=>q*10)],
            p26: [mu("кг",q=>q), mu("упаковка (0,25 кг)",q=>q*0.25), mu("коробка (2,5 кг)",q=>q*2.5), mu("коробка (5 кг)",q=>q*5), mu("коробка (2,4 кг)",q=>q*2.4)]
        },
        "Холодильная камера": {
            p12: [mu("кг",q=>q), mu("пакет (1,1 кг)",q=>q*1.1), mu("коробка (11,1 кг)",q=>q*11.1)],
            p13: [mu("кг",q=>q), mu("пакет (1,1 кг)",q=>q*1.1), mu("коробка (11,1 кг)",q=>q*11.1)],
            p14: [mu("л",q=>q), mu("упаковка (1 л)",q=>q), mu("коробка (12 л)",q=>q*12)],
            p15: [mu("шт",q=>q), mu("брикет (160 шт)",q=>q*160), mu("коробка (960 шт)",q=>q*960)],
            p27: [mu("кг",q=>q), mu("бутылка (6,9 кг)",q=>q*6.9), mu("коробка (13,8 кг)",q=>q*13.8)]
        },
        "Сухой склад": {
            p16: [mu("кг",q=>q), mu("пакет (1 кг)",q=>q), mu("коробка (8 кг)",q=>q*8), mu("коробка (4 кг)",q=>q*4)],
            p17: [mu("пакет (11,34 кг)",q=>q*11.34)],
            p27: [mu("кг",q=>q), mu("бутылка (6,9 кг)",q=>q*6.9), mu("коробка (13,8 кг)",q=>q*13.8)]
        }
    };

    const locations = ["На станции","Морозный ларь","Морозильная камера","Холодильная камера","Сухой склад"];
    let currentLocIdx = 0;
    let currentLoc = locations[0];
    let filterOnlyFilled = true;
    let searchQ = '';

    /* ── Storage ── */
    function getRows(loc, pid, uIdx) {
        const raw = localStorage.getItem(`inv_${loc}_${pid}_${uIdx}`);
        return raw ? JSON.parse(raw) : [null];
    }
    function setRows(loc, pid, uIdx, rows) {
        localStorage.setItem(`inv_${loc}_${pid}_${uIdx}`, JSON.stringify(rows));
    }
    function getCU(loc, pid) {
        const raw = localStorage.getItem(`cu_${loc}_${pid}`);
        return raw ? JSON.parse(raw) : [];
    }
    function setCU(loc, pid, cu) {
        localStorage.setItem(`cu_${loc}_${pid}`, JSON.stringify(cu));
    }

    /* ── Calc ── */
    function getLocTotal(loc, pid) {
        let t = 0;
        const rules = locationRules[loc]?.[pid];
        if (rules) rules.forEach((u, i) => getRows(loc, pid, i).forEach(v => {
            t += u.toBase(v == null || v === '' ? 0 : parseFloat(v));
        }));
        getCU(loc, pid).forEach(cu => cu.rows.forEach(v => {
            t += (v == null || v === '' ? 0 : parseFloat(v)) * cu.coefficient;
        }));
        return t;
    }
    function getAllTotal(pid) {
        return locations.reduce((s, loc) => s + getLocTotal(loc, pid), 0);
    }
    function fmt(pid, val) {
        const p = products.find(x => x.id === pid);
        return p?.baseUnit === 'шт' ? Math.round(val) : Math.round(val * 1000) / 1000;
    }
    function getStep(label) {
        const l = label.toLowerCase();
        return l === 'кг' || l === 'л' ? 0.1 : 1;
    }
    function rnd(v, s) { return s === 0.1 ? Math.round(v * 10) / 10 : Math.round(v); }

    /* ── Toast ── */
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    /* ── Nav badge ── */
    function updateNavBadge() {
        const totalFilled = products.filter(p => getAllTotal(p.id) > 0).length;
        const badge = document.getElementById('navBadge');
        badge.style.display = totalFilled > 0 ? 'flex' : 'none';
        badge.textContent = totalFilled;
    }

    /* ── Location strip
         ИСПРАВЛЕНИЕ: renderLocStrip только рисует чипы,
         scrollIntoView вызывается отдельно только при смене локации
    ── */
    function renderLocStrip() {
        const c = document.getElementById('locStrip');
        c.innerHTML = '';
        locations.forEach((loc, i) => {
            const chip = document.createElement('div');
            chip.className = 'loc-chip' + (i === currentLocIdx ? ' active' : '');
            chip.id = `locchip_${i}`;
            const hasData = Object.keys(locationRules[loc] || {})
                .some(pid => getLocTotal(loc, pid) > 0);
            if (hasData) chip.classList.add('has-data');
            chip.innerHTML = `<span class="loc-dot"></span>${loc}`;
            chip.onclick = () => switchLocation(i);
            c.appendChild(chip);
        });
    }

    /* ── Точечное обновление has-data у чипа (без перерисовки и без scrollIntoView) ── */
    function updateLocChipData(locIdx) {
        const chip = document.getElementById(`locchip_${locIdx}`);
        if (!chip) return;
        const loc = locations[locIdx];
        const hasData = Object.keys(locationRules[loc] || {})
            .some(pid => getLocTotal(loc, pid) > 0);
        chip.classList.toggle('has-data', hasData);
    }

    /* ── Stats (только текстовые счётчики, без перерисовки локаций) ── */
    function renderStats() {
        const rules = locationRules[currentLoc] || {};
        const pids = Object.keys(rules);
        const total = pids.length;
        const filled = pids.filter(pid => getLocTotal(currentLoc, pid) > 0).length;
        const pct = total > 0 ? Math.round(filled / total * 100) : 0;
        document.getElementById('stTotal').textContent = total;
        document.getElementById('stFilled').textContent = filled;
        document.getElementById('stPct').textContent = pct + '%';
    }

    /* ── Switch location ── */
    function switchLocation(idx) {
        currentLocIdx = idx;
        currentLoc = locations[idx];
        renderLocStrip();
        // scrollIntoView только здесь — при явной смене помещения
        const active = document.getElementById(`locchip_${idx}`);
        if (active) active.scrollIntoView({ block: 'nearest', inline: 'center' });
        renderStats();
        renderProducts();
    }

    /* ── Products ── */
    function renderProducts() {
        const container = document.getElementById('productsList');
        container.innerHTML = '';
        const rules = locationRules[currentLoc] || {};
        const pids = new Set(Object.keys(rules));
        products.forEach(p => { if (getCU(currentLoc, p.id).length > 0) pids.add(p.id); });

        if (pids.size === 0) {
            container.innerHTML = `<div class="empty-state"><div class="ei">📭</div><p>Нет позиций для этого помещения</p></div>`;
            return;
        }
        pids.forEach(pid => {
            const product = products.find(p => p.id === pid);
            if (!product) return;
            container.appendChild(buildProductCard(product, rules[pid] || []));
        });
    }

    function buildProductCard(product, unitRules) {
        const pid = product.id;
        const totalVal = fmt(pid, getLocTotal(currentLoc, pid));
        const hasData = totalVal > 0;

        const card = document.createElement('div');
        card.className = 'product-card' + (hasData ? ' has-data' : '');
        card.id = `pcard_${pid}`;

        const header = document.createElement('div');
        header.className = 'product-header';
        header.innerHTML = `
            <div class="product-indicator"></div>
            <div class="product-name">${product.name}</div>
            <div class="product-meta">
                <div class="product-total ${hasData?'':'zero'}" id="ptotal_${pid}">${totalVal}</div>
                <div class="product-unit-tag">${product.baseUnit}</div>
            </div>
            <div class="product-chevron">⌄</div>`;
        header.onclick = () => card.classList.toggle('open');
        card.appendChild(header);

        const body = document.createElement('div');
        body.className = 'product-body';

        unitRules.forEach((unit, uIdx) => {
            body.appendChild(buildUnitBlock(currentLoc, pid, uIdx, unit.label, false));
        });
        getCU(currentLoc, pid).forEach((cu, cuIdx) => {
            body.appendChild(buildUnitBlock(currentLoc, pid, cuIdx, cu.label, true, cu.coefficient));
        });

        const footer = document.createElement('div');
        footer.className = 'product-footer';

        const addBtn = document.createElement('button');
        addBtn.className = 'add-custom-btn';
        addBtn.textContent = '➕ Своя единица';
        addBtn.onclick = () => toggleCustomForm(body, currentLoc, pid);

        const clrBtn = document.createElement('button');
        clrBtn.className = 'clear-product-btn';
        clrBtn.textContent = '🗑 Очистить';
        clrBtn.onclick = () => {
            if (!confirm(`Очистить "${product.name}"?`)) return;
            unitRules.forEach((_, uIdx) => setRows(currentLoc, pid, uIdx, [null]));
            setCU(currentLoc, pid, []);
            refreshCard(pid);
        };

        footer.appendChild(addBtn);
        footer.appendChild(clrBtn);
        body.appendChild(footer);
        card.appendChild(body);
        return card;
    }

    /* ── Unit block ── */
    function buildUnitBlock(loc, pid, idx, label, isCustom, coef) {
        const s = getStep(label);
        const block = document.createElement('div');
        block.className = 'unit-block';

        const bHeader = document.createElement('div');
        bHeader.className = 'unit-block-header';

        const nameEl = document.createElement('div');
        nameEl.className = 'unit-name';
        nameEl.textContent = isCustom ? `${label} ×${coef}` : label;

        const subEl = document.createElement('div');
        subEl.className = 'unit-subtotal';
        subEl.id = `ust_${loc}_${pid}_${idx}_${isCustom?'c':'s'}`;

        if (isCustom) {
            const delBtn = document.createElement('button');
            delBtn.style.cssText = 'background:var(--red-light);border:none;color:var(--red);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;';
            delBtn.textContent = '✖';
            delBtn.onclick = () => {
                let cu = getCU(loc, pid);
                cu.splice(idx, 1);
                setCU(loc, pid, cu);
                refreshCard(pid);
            };
            bHeader.appendChild(nameEl);
            bHeader.appendChild(delBtn);
        } else {
            bHeader.appendChild(nameEl);
            bHeader.appendChild(subEl);
        }
        block.appendChild(bHeader);

        const rowsWrap = document.createElement('div');
        rowsWrap.className = 'unit-rows';
        block.appendChild(rowsWrap);

        function refreshRows() {
            const data = isCustom
                ? (getCU(loc, pid)[idx]?.rows || [null])
                : getRows(loc, pid, idx);

            rowsWrap.innerHTML = '';
            let subTotal = 0;

            data.forEach((val, i) => {
                const v = val == null || val === '' ? 0 : parseFloat(val);
                subTotal += isCustom
                    ? v * coef
                    : (locationRules[loc]?.[pid]?.[idx]?.toBase(v) || 0);

                const row = document.createElement('div');
                row.className = 'row-item';

                const num = document.createElement('span');
                num.className = 'row-num';
                num.textContent = i + 1;

                const vc = document.createElement('div');
                vc.className = 'vc';

                const dec = document.createElement('button');
                dec.className = 'vc-btn';
                dec.textContent = '−';

                const inp = document.createElement('input');
                inp.className = 'vc-input';
                inp.type = 'number';
                inp.inputMode = 'decimal';
                inp.step = s;
                inp.placeholder = '0';
                inp.value = val == null || val === '' ? '' : val;

                const inc = document.createElement('button');
                inc.className = 'vc-btn';
                inc.textContent = '+';

                vc.appendChild(dec);
                vc.appendChild(inp);
                vc.appendChild(inc);

                const acts = document.createElement('div');
                acts.className = 'row-actions';

                const addRow = document.createElement('button');
                addRow.className = 'row-action-btn';
                addRow.textContent = '+';

                const delRow = document.createElement('button');
                delRow.className = 'row-action-btn del';
                delRow.textContent = '−';

                acts.appendChild(addRow);
                acts.appendChild(delRow);

                row.appendChild(num);
                row.appendChild(vc);
                row.appendChild(acts);
                rowsWrap.appendChild(row);

                /* ── save: только обновляет данные и итоги, без перерисовки DOM ── */
                const save = () => {
                    let nv = inp.value === '' ? null : rnd(parseFloat(inp.value) || 0, s);
                    if (nv !== null) inp.value = nv;
                    if (isCustom) {
                        let cu = getCU(loc, pid);
                        if (cu[idx]) { cu[idx].rows[i] = nv; setCU(loc, pid, cu); }
                    } else {
                        let r = getRows(loc, pid, idx);
                        r[i] = nv;
                        setRows(loc, pid, idx, r);
                    }
                    // Обновляем только нужные элементы без перерисовки списка
                    updateSubtotal(loc, pid, idx, isCustom, coef);
                    updateCardTotal(pid);
                    updateNavBadge();
                    if (document.getElementById('tabSummary').classList.contains('active')) renderSummary();
                };

                inp.addEventListener('change', save);
                inp.addEventListener('blur', save);

                dec.addEventListener('click', () => {
                    let v = inp.value === '' ? 0 : parseFloat(inp.value) || 0;
                    inp.value = rnd(Math.max(0, v - s), s);
                    save();
                });
                inc.addEventListener('click', () => {
                    let v = inp.value === '' ? 0 : parseFloat(inp.value) || 0;
                    inp.value = rnd(v + s, s);
                    save();
                });

                /* ── addRow/delRow: перерисовывает только rowsWrap, не трогает скролл страницы ── */
                addRow.addEventListener('click', () => {
                    if (isCustom) {
                        let cu = getCU(loc, pid);
                        if (cu[idx]) { cu[idx].rows.push(null); setCU(loc, pid, cu); }
                    } else {
                        let r = getRows(loc, pid, idx);
                        r.push(null);
                        setRows(loc, pid, idx, r);
                    }
                    refreshRows();
                });

                delRow.addEventListener('click', () => {
                    if (isCustom) {
                        let cu = getCU(loc, pid);
                        if (cu[idx]) {
                            if (cu[idx].rows.length === 1) cu[idx].rows = [null];
                            else cu[idx].rows.splice(i, 1);
                            setCU(loc, pid, cu);
                        }
                    } else {
                        let r = getRows(loc, pid, idx);
                        if (r.length === 1) r = [null]; else r.splice(i, 1);
                        setRows(loc, pid, idx, r);
                    }
                    refreshRows();
                    updateSubtotal(loc, pid, idx, isCustom, coef);
                    updateCardTotal(pid);
                    updateNavBadge();
                });
            });

            // Обновляем субтотал после перерисовки строк
            const stEl = document.getElementById(`ust_${loc}_${pid}_${idx}_${isCustom?'c':'s'}`);
            if (stEl) stEl.textContent = subTotal > 0 ? `= ${rnd(subTotal, 0.1)}` : '';
        }

        refreshRows();
        return block;
    }

    /* ── Точечное обновление субтотала единицы (без перерисовки DOM) ── */
    function updateSubtotal(loc, pid, idx, isCustom, coef) {
        const data = isCustom
            ? (getCU(loc, pid)[idx]?.rows || [null])
            : getRows(loc, pid, idx);
        let subTotal = 0;
        data.forEach(v => {
            const n = v == null || v === '' ? 0 : parseFloat(v);
            subTotal += isCustom ? n * coef : (locationRules[loc]?.[pid]?.[idx]?.toBase(n) || 0);
        });
        const stEl = document.getElementById(`ust_${loc}_${pid}_${idx}_${isCustom?'c':'s'}`);
        if (stEl) stEl.textContent = subTotal > 0 ? `= ${rnd(subTotal, 0.1)}` : '';
    }

    /* ── Точечное обновление итога карточки товара (без перерисовки карточки) ── */
    function updateCardTotal(pid) {
        const el = document.getElementById(`ptotal_${pid}`);
        const card = document.getElementById(`pcard_${pid}`);
        if (!el || !card) return;
        const product = products.find(p => p.id === pid);
        const val = fmt(pid, getLocTotal(currentLoc, pid));
        el.textContent = val;
        el.className = 'product-total' + (val > 0 ? '' : ' zero');
        card.classList.toggle('has-data', val > 0);
        card.querySelector('.product-indicator')?.classList.toggle('has-data', val > 0);

        // Точечно обновляем только индикатор на чипе локации — без scrollIntoView
        updateLocChipData(currentLocIdx);
        renderStats();
    }

    /* ── Полная перерисовка карточки (при удалении кастомной единицы) ── */
    function refreshCard(pid) {
        const card = document.getElementById(`pcard_${pid}`);
        if (!card) return;
        const product = products.find(p => p.id === pid);
        if (!product) return;
        const wasOpen = card.classList.contains('open');
        const newCard = buildProductCard(product, locationRules[currentLoc]?.[pid] || []);
        if (wasOpen) newCard.classList.add('open');
        card.replaceWith(newCard);
        updateLocChipData(currentLocIdx);
        renderStats();
        updateNavBadge();
        if (document.getElementById('tabSummary').classList.contains('active')) renderSummary();
    }

    /* ── Custom form ── */
    function toggleCustomForm(body, loc, pid) {
        const existing = body.querySelector('.custom-form');
        if (existing) { existing.remove(); return; }

        const form = document.createElement('div');
        form.className = 'custom-form';
        form.innerHTML = `
            <div class="custom-form-title">➕ Новая единица</div>
            <input type="text" placeholder="Название (напр. коробка 10 кг)" id="cfLabel">
            <input type="number" step="any" inputmode="decimal" placeholder="Сколько базовых единиц" id="cfCoef">
            <div class="custom-form-btns">
                <button class="cf-save" id="cfSave">💾 Сохранить</button>
                <button class="cf-cancel" id="cfCancel">Отмена</button>
            </div>`;
        const footer = body.querySelector('.product-footer');
        body.insertBefore(form, footer);

        form.querySelector('#cfSave').onclick = () => {
            const label = form.querySelector('#cfLabel').value.trim();
            const coef = parseFloat(form.querySelector('#cfCoef').value);
            if (!label || isNaN(coef) || coef <= 0) { toast('⚠️ Введите корректные данные'); return; }
            let cu = getCU(loc, pid);
            cu.push({ label, coefficient: coef, rows: [null] });
            setCU(loc, pid, cu);
            refreshCard(pid);
        };
        form.querySelector('#cfCancel').onclick = () => form.remove();
        form.querySelector('#cfLabel').focus();
    }

    /* ── Summary ── */
    function renderSummary() {
        const allRows = products.map(p => {
            const total = getAllTotal(p.id);
            const display = fmt(p.id, total);
            const detail = locations
                .filter(loc => locationRules[loc]?.[p.id])
                .map(loc => {
                    const v = fmt(p.id, getLocTotal(loc, p.id));
                    return v > 0 ? `${loc}: ${v}` : null;
                }).filter(Boolean).join('\n') || '';
            return { pid: p.id, name: p.name, unit: p.baseUnit, total: display, detail };
        });

        const filled = allRows.filter(r => r.total > 0).length;
        document.getElementById('summaryStats').innerHTML = `
            <div class="ss-card"><div class="ss-val">${allRows.length}</div><div class="ss-lbl">Всего позиций</div></div>
            <div class="ss-card"><div class="ss-val green">${filled}</div><div class="ss-lbl">Заполнено</div></div>
            <div class="ss-card"><div class="ss-val blue">${Math.round(filled/allRows.length*100)}%</div><div class="ss-lbl">Готовность</div></div>
            <div class="ss-card"><div class="ss-val">${allRows.length - filled}</div><div class="ss-lbl">Пустых</div></div>`;

        let rows = allRows;
        if (searchQ) rows = rows.filter(r => r.name.toLowerCase().includes(searchQ.toLowerCase()));
        if (filterOnlyFilled) rows = rows.filter(r => r.total > 0);

        const list = document.getElementById('summaryList');
        list.innerHTML = '';
        if (rows.length === 0) {
            list.innerHTML = `<div class="empty-state"><div class="ei">🔍</div><p>Ничего не найдено</p></div>`;
            return;
        }
        rows.forEach(r => {
            const item = document.createElement('div');
            item.className = 'sum-item' + (r.total === 0 ? ' zero' : '');
            item.innerHTML = `
                <div class="sum-item-left">
                    <div class="sum-item-name">${r.name}</div>
                    ${r.detail ? `<div class="sum-item-detail">${r.detail.replace(/\n/g,'<br>')}</div>` : ''}
                </div>
                <div class="sum-item-right">
                    <div class="sum-item-val ${r.total===0?'zero':''}">${r.total}</div>
                    <div class="sum-item-unit">${r.unit}</div>
                </div>`;
            list.appendChild(item);
        });
    }

    function copySummary() {
        const rows = products.map(p => ({
            name: p.name, unit: p.baseUnit,
            total: fmt(p.id, getAllTotal(p.id)),
            detail: locations.filter(l => locationRules[l]?.[p.id])
                .map(l => { const v = fmt(p.id, getLocTotal(l, p.id)); return v > 0 ? `${l}: ${v}` : null; })
                .filter(Boolean).join(', ')
        }));
        let tsv = 'Продукт\tЕд. изм.\tИтого\tДетализация\n';
        rows.forEach(r => tsv += `${r.name}\t${r.unit}\t${r.total}\t${r.detail}\n`);
        navigator.clipboard.writeText(tsv)
            .then(() => toast('✅ Скопировано в буфер обмена'))
            .catch(() => toast('❌ Ошибка копирования'));
    }

    /* ── Clear / Reset ── */
    function clearLocation() {
        if (!confirm(`Очистить все данные для "${currentLoc}"?`)) return;
        const rules = locationRules[currentLoc] || {};
        Object.keys(rules).forEach(pid => {
            rules[pid].forEach((_, uIdx) => setRows(currentLoc, pid, uIdx, [null]));
            setCU(currentLoc, pid, []);
        });
        renderLocStrip();
        renderStats();
        renderProducts();
        updateNavBadge();
        toast('🧹 Помещение очищено');
    }

    function fullReset() {
        if (!confirm('⚠️ Удалить ВСЕ данные по всем помещениям?')) return;
        locations.forEach(loc => {
            const rules = locationRules[loc] || {};
            Object.keys(rules).forEach(pid => {
                rules[pid].forEach((_, uIdx) => setRows(loc, pid, uIdx, [null]));
                setCU(loc, pid, []);
            });
            products.forEach(p => setCU(loc, p.id, []));
        });
        renderLocStrip();
        renderStats();
        renderProducts();
        updateNavBadge();
        if (document.getElementById('tabSummary').classList.contains('active')) renderSummary();
        toast('🗑️ Все данные удалены');
    }

    /* ── Tab switch ── */
    function switchTab(tab) {
        document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if (tab === 'inventory') {
            document.getElementById('tabInventory').classList.add('active');
            document.getElementById('navInventory').classList.add('active');
        } else {
            document.getElementById('tabSummary').classList.add('active');
            document.getElementById('navSummary').classList.add('active');
            renderSummary();
        }
        document.getElementById('appBody').scrollTop = 0;
    }

    /* ── Init ── */
    function init() {
        renderLocStrip();
        renderStats();
        renderProducts();
        updateNavBadge();

        document.getElementById('clearLocBtn').onclick = clearLocation;
        document.getElementById('hardResetBtn').onclick = fullReset;
        document.getElementById('copyBtn').onclick = copySummary;

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => switchTab(btn.dataset.tab);
        });

        document.getElementById('searchInput').oninput = e => {
            searchQ = e.target.value;
            renderSummary();
        };

        const btnAll = document.getElementById('filterAllBtn');
        const btnFilled = document.getElementById('filterFilledBtn');
        btnAll.onclick = () => {
            filterOnlyFilled = false;
            btnAll.classList.add('active');
            btnFilled.classList.remove('active');
            renderSummary();
        };
        btnFilled.onclick = () => {
            filterOnlyFilled = true;
            btnFilled.classList.add('active');
            btnAll.classList.remove('active');
            renderSummary();
        };
    }

    init();
})();
</script>
</body>
</html>
